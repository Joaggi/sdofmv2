name: sdofmv2
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────
  - python=3.11

  # ── Scientific core ───────────────────────────────────────────
  - numpy=2.3.5
  - pandas=2.3.3
  - scipy=1.16.3
  - scikit-learn=1.8.0
  - scikit-image=0.25.2
  - matplotlib=3.10.8
  - xarray=2025.12.0

  # ── Solar / domain specific ───────────────────────────────────
  - sunpy=7.0.4
  - zarr=2.18.3
  - python-blosc=1.11.3
  - h5py=3.15.1
  - astropy-base=7.2.0

  # ── Model architectures ───────────────────────────────────────
  - transformers=4.57.3
  - tokenizers=0.22.2
  - timm=1.0.22
  - einops=0.8.1
  - safetensors=0.7.0

  # ── Experiment tracking & config ──────────────────────────────
  - wandb=0.23.1
  - hydra-core=1.3.2
  - omegaconf=2.3.0
  - optuna=4.6.0
  - loguru=0.7.3
  - rich=14.2.0
  - pyyaml=6.0.3

  # ── Utilities ─────────────────────────────────────────────────
  - joblib=1.5.3
  - overrides=7.7.0
  - tqdm=4.67.1
  - dask=2025.11.0
  - datasets=4.4.1
  - s3fs

  # ── Dev / notebook ────────────────────────────────────────────
  - ipykernel=7.1.0
  - ipython=9.8.0

  # ── Pip-only packages ─────────────────────────────────────────
  - pip:
    # IMPORTANT: The packages below are configured for CUDA 12.8. 
    # If your GPU requires a different version (e.g., CUDA 11.8), change 
    # 'cu128' to 'cu118' in the URLs and package versions below.
    - "--extra-index-url https://download.pytorch.org/whl/cu128"
    - torch==2.7.0+cu128
    - torchvision==0.22.0+cu128
    - torchaudio==2.7.0+cu128
    - torchcodec==0.8.1
    - torchvision-extra-decoders==0.0.2
    
    # ── Lightning ecosystem ──
    - lightning==2.6.0
    - torchmetrics==1.8.2
    
    - segmentation-models-pytorch==0.5.0
    - efficientnet-pytorch==0.6.3
    - pretrainedmodels==0.7.4
    - "-e ."